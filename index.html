<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Royal Roulette · หรูหราเสมือนจริง</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --gold: #d4a843; --gold2: #f0c96a; --gold3: #a07820;
      --felt: #0a3d1a; --felt2: #052a10; --feltDark: #031c0b;
      --red: #b31b1b; --redDk: #6e0e0e; --blk: #181818; --blkDk: #0c0c0c;
      --green: #0b5825; --txt: #f5e7c6; --txt2: #c9a85c;
    }
    html, body { width:100%; min-height:100vh; overflow-x:hidden; background: radial-gradient(ellipse 120% 100% at 50% 0%, #0f5528 0%, #041a0a 70%, #010603 100%); font-family:'Sarabun',sans-serif; color:var(--txt); user-select:none; }
    /* ─── HEADER & NAME ─── */
    .header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:rgba(0,0,0,0.7); border-bottom:1px solid rgba(212,168,67,0.3); }
    .name-area { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.05); border-radius:20px; padding:4px 12px; cursor:pointer; }
    .name-area span { font-weight:600; color:var(--gold); max-width:100px; overflow:hidden; text-overflow:ellipsis; }
    .live-badge { display:flex; align-items:center; gap:4px; font-size:12px; }
    .live-dot { width:8px;height:8px; border-radius:50%; background:#0f0; box-shadow:0 0 10px #0f0; animation:pulse 1.4s infinite; }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .menu-btn { width:32px;height:32px; border-radius:8px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; }
    .menu-btn span { width:16px;height:2px; background:#ddd; border-radius:2px; }

    /* ─── BALANCE BAR ─── */
    .balance-bar { display:flex; justify-content:space-between; align-items:center; padding:5px 14px; background:rgba(0,0,0,0.4); font-size:13px; }
    .balance { color:var(--gold2); font-weight:700; }
    .bet-info { color:#aaa; }

    /* ─── WHEEL PANEL ─── */
    .wheel-panel { display:flex; align-items:center; justify-content:center; padding:8px 10px; gap:10px; flex-wrap:wrap; }
    .wheel-container { position:relative; width:230px; height:230px; flex-shrink:0; }
    .wheel-rim { position:absolute; inset:-8px; border-radius:50%; background:conic-gradient(#a07820,#d4a843,#f0c96a,#d4a843,#a07820,#f0c96a,#d4a843); box-shadow:0 0 35px rgba(212,168,67,0.6),0 0 70px rgba(212,168,67,0.25); }
    .wheel-rim2 { position:absolute; inset:-2px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); }
    canvas#wheelCanvas { border-radius:50%; display:block; width:100%; height:100%; position:relative; z-index:2; }
    .wheel-pointer { position:absolute; top:-12px; left:50%; transform:translateX(-50%); z-index:20; filter:drop-shadow(0 2px 8px #d4a843); }
    .last-number { position:absolute; right:-30px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.7); border:2px solid rgba(212,168,67,0.6); border-radius:10px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-weight:900; font-size:18px; }
    .history-strip { display:flex; align-items:center; gap:4px; padding:4px 10px; background:rgba(0,0,0,0.5); border-top:1px solid rgba(212,168,67,0.15); overflow-x:auto; }
    .history-num { min-width:26px;height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; border:1px solid rgba(255,255,255,0.15); }
    .history-num.r{background:var(--red)} .history-num.b{background:#222} .history-num.g{background:var(--green);color:var(--gold)}

    /* ─── CHIPS ─── */
    .chips-row { display:flex; justify-content:center; gap:8px; padding:8px 0; flex-wrap:wrap; }
    .chip { width:44px;height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:11px; font-weight:700; cursor:pointer; border:3px solid; position:relative; box-shadow:0 4px 10px rgba(0,0,0,0.7); transition:0.15s; }
    .chip.active { transform:translateY(-4px) scale(1.1); filter:brightness(1.4); border-color:var(--gold2)!important; box-shadow:0 0 18px rgba(240,201,106,0.8); }
    .chip:hover { transform:translateY(-2px); }

    /* ─── TABLE ─── */
    .table-section { padding:0 6px 14px; }
    .table-grid { background:rgba(0,0,0,0.3); border:2px solid var(--gold3); border-radius:12px; overflow:hidden; box-shadow:0 0 30px rgba(0,0,0,0.6); }
    .zero-row { display:flex; }
    .zero-cell { flex:1; text-align:center; padding:8px 0; background:linear-gradient(145deg,#0e622a,#053d16); font-family:'Cinzel',serif; font-size:18px; font-weight:700; cursor:pointer; border-bottom:1px solid var(--gold3); }
    .main-grid { display:flex; }
    .left-bets { display:flex; flex-direction:column; min-width:44px; }
    .left-btn { flex:1; display:flex; align-items:center; justify-content:center; writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg); font-size:9px; font-weight:700; color:var(--gold); cursor:pointer; background:rgba(8,42,18,0.7); border-right:1px solid rgba(212,168,67,0.2); }
    .number-grid { flex:1; display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:1fr; gap:1px; background:rgba(212,168,67,0.2); }
    .number-cell { display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:14px; font-weight:700; cursor:pointer; min-height:34px; position:relative; transition:0.1s; }
    .number-cell.red { background:linear-gradient(145deg,#b01c14,#7a1209); }
    .number-cell.black { background:linear-gradient(145deg,#2a2a2a,#0e0e0e); }
    .right-bets { display:flex; flex-direction:column; min-width:38px; }
    .right-btn { flex:1; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:var(--gold); cursor:pointer; background:rgba(8,42,18,0.7); border-left:1px solid rgba(212,168,67,0.2); writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg); }
    .column-row { display:flex; }
    .col-btn { flex:1; text-align:center; padding:5px 0; font-size:10px; font-weight:700; color:var(--gold); background:rgba(8,42,18,0.8); border-top:1px solid rgba(212,168,67,0.3); cursor:pointer; }
    /* split / corner etc. */
    .split-v, .split-h { position:absolute; background:rgba(255,215,0,0.01); z-index:5; cursor:pointer; }
    .split-v { width:8px; height:100%; left:-4px; }
    .split-h { height:8px; width:100%; top:-4px; left:0; }
    .corner-spot { position:absolute; width:12px; height:12px; border-radius:50%; background:rgba(255,215,0,0.0); z-index:6; cursor:pointer; }
    .sixline-btn { position:absolute; right:-24px; height:16px; width:20px; background:rgba(255,215,0,0.2); border-radius:4px; cursor:pointer; }

    /* badge */
    .bet-badge { position:absolute; top:-6px; right:-6px; background:var(--gold); color:#000; font-size:8px; font-weight:700; border-radius:50%; width:17px; height:17px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px black; z-index:20; }

    /* ─── RACETRACK ─── */
    .racetrack-panel { padding:6px 12px; background:rgba(0,0,0,0.4); border-top:1px solid rgba(212,168,67,0.2); }
    .racetrack-title { font-size:11px; color:var(--gold); margin-bottom:4px; }
    .racetrack { position:relative; width:100%; height:70px; }
    .racetrack-number { position:absolute; width:24px; height:24px; border-radius:50%; background:#222; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; cursor:pointer; border:1px solid var(--gold3); color:#ddd; transform:translate(-50%,-50%); transition:0.15s; }
    .racetrack-number:hover { background:var(--gold); color:#000; }
    .special-bets { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
    .special-btn { background:rgba(10,30,10,0.8); border:1px solid var(--gold3); color:var(--gold2); padding:4px 10px; border-radius:16px; font-size:10px; font-weight:600; cursor:pointer; }

    /* ─── ACTIONS ─── */
    .actions { display:flex; gap:8px; padding:8px 14px; justify-content:center; }
    .action-btn { padding:12px 0; border:none; border-radius:30px; font-family:'Cinzel',serif; font-weight:700; cursor:pointer; letter-spacing:1px; }
    .undo-btn { background:rgba(70,60,10,0.8); border:1px solid #aa9020; color:#e8cc60; width:70px; }
    .clear-btn { background:rgba(80,10,10,0.8); border:1px solid #993020; color:#f08070; width:70px; }
    .spin-btn { flex:1; max-width:220px; background:linear-gradient(135deg,#8a6010,var(--gold),var(--gold2),#8a6010); color:#000; font-size:16px; box-shadow:0 5px 20px rgba(212,168,67,0.5); }

    /* ─── MODAL ─── */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; pointer-events:none; transition:0.3s; }
    .modal.on { opacity:1; pointer-events:all; }
    .modal-content { background:linear-gradient(160deg,#0e3d1c,#041209); border:2px solid var(--gold3); border-radius:20px; padding:28px 32px; text-align:center; width:280px; box-shadow:0 0 60px rgba(212,168,67,0.5); }
    .modal-number { font-family:'Cinzel',serif; font-size:72px; font-weight:900; }
    .modal-sub { font-size:12px; color:#aaa; letter-spacing:2px; }
    .modal-result { font-family:'Cinzel',serif; font-size:28px; font-weight:700; margin:8px 0; }
    .modal-amount { color:var(--gold); margin-bottom:16px; }

    /* ─── TOAST ─── */
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); border:1px solid var(--gold3); padding:8px 20px; border-radius:20px; font-size:13px; color:var(--gold); opacity:0; transition:0.3s; z-index:1200; }
    .toast.show { opacity:1; }
    .confetti { position:fixed; width:8px; height:8px; top:-10px; animation:fall linear forwards; z-index:1100; }
    @keyframes fall{ 0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="name-area" id="nameArea" onclick="editName()">
      <span id="playerNameDisplay">👤 ตั้งชื่อ</span>
    </div>
    <div class="live-badge"><span class="live-dot"></span> LIVE</div>
    <div class="menu-btn"><span></span><span></span><span></span></div>
  </div>

  <!-- BALANCE -->
  <div class="balance-bar">
    <span>💰 <span class="balance" id="balanceDisplay">1,000.00</span></span>
    <span class="bet-info">วางเดิมพัน: <b id="totalBetDisplay">0</b> | ขั้นต่ำ 10</span>
  </div>

  <!-- WHEEL -->
  <div class="wheel-panel">
    <div class="wheel-container">
      <div class="wheel-rim"></div><div class="wheel-rim2"></div>
      <canvas id="wheelCanvas" width="260" height="260"></canvas>
      <div class="wheel-pointer"><svg width="20" height="28" viewBox="0 0 20 28"><polygon points="10,0 20,28 0,28" fill="#d4a843"/></svg></div>
    </div>
    <div class="last-number" id="lastNumber">0</div>
  </div>

  <!-- HISTORY -->
  <div class="history-strip" id="historyStrip"><span style="color:#666;font-size:10px;">ผลล่าสุด:</span></div>

  <!-- CHIPS -->
  <div class="chips-row" id="chipsContainer">
    <div class="chip" data-value="10">10</div>
    <div class="chip" data-value="20">20</div>
    <div class="chip" data-value="50">50</div>
    <div class="chip" data-value="100">100</div>
    <div class="chip" data-value="200">200</div>
    <div class="chip" data-value="500">500</div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-grid" id="tableGrid"></div>
  </div>

  <!-- RACETRACK -->
  <div class="racetrack-panel">
    <div class="racetrack-title">🏁 RACETRACK (เพื่อนบ้าน)</div>
    <div class="racetrack" id="racetrackContainer"></div>
    <div class="special-bets">
      <span class="special-btn" onclick="placeSpecial('voisins')">VOISINS</span>
      <span class="special-btn" onclick="placeSpecial('tiers')">TIERS</span>
      <span class="special-btn" onclick="placeSpecial('orphelins')">ORPHELINS</span>
      <span class="special-btn" onclick="placeSpecial('zero')">ZERO SPIEL</span>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="action-btn undo-btn" onclick="undoBet()">↩ UNDO</button>
    <button class="action-btn spin-btn" id="spinButton" onclick="startSpin()">SPIN ▶</button>
    <button class="action-btn clear-btn" onclick="clearBets()">✕ CLEAR</button>
  </div>

  <!-- MODAL -->
  <div class="modal" id="resultModal">
    <div class="modal-content">
      <div class="modal-number" id="modalNumber">0</div>
      <div class="modal-sub" id="modalSub">GREEN</div>
      <div class="modal-result" id="modalVerdict">-</div>
      <div class="modal-amount" id="modalAmount"></div>
      <button class="special-btn" style="width:100%;padding:10px;" onclick="closeModal()">เล่นต่อ ▶</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // ═══════════════════════════ CONFIG ═══════════════════════════
      const WHEEL_ORDER = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
      const REDS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
      const NUMBER_POS = {}; // index of each number on wheel
      WHEEL_ORDER.forEach((n,i)=> NUMBER_POS[n]=i);

      // Audio context
      let audioCtx = null;
      function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }

      // State
      let playerName = localStorage.getItem('royalRouletteName') || '';
      let balance = parseFloat(localStorage.getItem('royalRouletteBalance')) || 1000;
      let chipValue = 10;
      let bets = {}; // key -> amount
      let betHistory = []; // for undo
      let spinning = false;
      let lastResults = [];

      // Canvas & wheel
      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const W = 260, H = 260, CX = 130, CY = 130, R = 120;
      let wheelAngle = 0;
      let ballAngle = 0; // world angle of ball (radians)
      let ballVisible = false;
      let animationId = null;

      // DOM elements
      const balanceDisplay = document.getElementById('balanceDisplay');
      const totalBetDisplay = document.getElementById('totalBetDisplay');
      const lastNumberDiv = document.getElementById('lastNumber');
      const historyStrip = document.getElementById('historyStrip');
      const resultModal = document.getElementById('resultModal');
      const modalNumber = document.getElementById('modalNumber');
      const modalSub = document.getElementById('modalSub');
      const modalVerdict = document.getElementById('modalVerdict');
      const modalAmount = document.getElementById('modalAmount');
      const toast = document.getElementById('toast');
      const nameDisplay = document.getElementById('playerNameDisplay');

      // ═══════════════ HELPERS ═══════════════
      function colorOf(n){ return n===0?'g':REDS.has(n)?'r':'b'; }
      function numStyle(n){ return n===0?'#0b5825':REDS.has(n)?'#b01c14':'#1a1a1a'; }
      function formatMoney(v){ return v.toLocaleString('th',{minimumFractionDigits:2,maximumFractionDigits:2}); }

      function updateUI(){
        balanceDisplay.textContent = formatMoney(balance);
        const total = Object.values(bets).reduce((a,b)=>a+b,0);
        totalBetDisplay.textContent = total.toLocaleString();
        document.getElementById('spinButton').disabled = (total===0 || spinning);
        lastNumberDiv.textContent = lastResults.length ? lastResults[0] : '0';
        lastNumberDiv.style.background = numStyle(lastResults.length ? lastResults[0] : 0);
        lastNumberDiv.style.color = '#fff';
        nameDisplay.textContent = playerName ? `👤 ${playerName}` : '👤 ตั้งชื่อ';
      }

      function saveState(){
        localStorage.setItem('royalRouletteBalance', balance);
      }

      function showToast(msg){ toast.textContent = msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2000); }

      // ═══════════════ AUDIO ═══════════════
      function playSound(type){
        if(!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if(type==='chip'){ osc.frequency.value=800; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.08); osc.start(now); osc.stop(now+0.08); }
        else if(type==='spin'){ osc.type='sawtooth'; osc.frequency.value=200; gain.gain.setValueAtTime(0.15,now); gain.gain.linearRampToValueAtTime(0.4,now+0.3); gain.gain.linearRampToValueAtTime(0.01,now+1.2); osc.start(now); osc.stop(now+1.2); }
        else if(type==='win'){ osc.frequency.value=523.25; gain.gain.setValueAtTime(0.2,now); gain.gain.linearRampToValueAtTime(0.001,now+0.4); osc.start(now); osc.stop(now+0.4); setTimeout(()=>{ const o2=audioCtx.createOscillator(); o2.frequency.value=659.25; const g2=audioCtx.createGain(); o2.connect(g2); g2.connect(audioCtx.destination); g2.gain.setValueAtTime(0.2,audioCtx.currentTime); g2.gain.linearRampToValueAtTime(0.001,audioCtx.currentTime+0.3); o2.start(); o2.stop(audioCtx.currentTime+0.3); },200); }
        else if(type==='lose'){ osc.frequency.value=200; gain.gain.setValueAtTime(0.15,now); gain.gain.linearRampToValueAtTime(0.001,now+0.5); osc.start(now); osc.stop(now+0.5); }
      }

      // ═══════════════ CHIPS ═══════════════
      document.querySelectorAll('.chip').forEach(el=>{
        el.addEventListener('click',function(e){
          chipValue = parseInt(this.dataset.value);
          document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
          this.classList.add('active');
          playSound('chip');
        });
      });
      document.querySelector('.chip[data-value="10"]').classList.add('active');

      // ═══════════════ BUILD TABLE ═══════════════
      function buildTable(){
        const grid = document.getElementById('tableGrid');
        grid.innerHTML = '';
        // Zero row
        const zeroRow = document.createElement('div'); zeroRow.className='zero-row';
        const zeroCell = document.createElement('div'); zeroCell.className='zero-cell'; zeroCell.textContent='0';
        zeroCell.onclick = ()=> placeBet('straight_0', zeroCell);
        zeroRow.appendChild(zeroCell);
        grid.appendChild(zeroRow);

        const mainGrid = document.createElement('div'); mainGrid.className='main-grid';
        // Left bets
        const leftBets = document.createElement('div'); leftBets.className='left-bets';
        const leftOptions = [
          {label:'1-18', key:'low'},{label:'EVEN', key:'even'},{label:'♦', key:'red', style:'background:#7a1209;'},
          {label:'◇', key:'black'},{label:'ODD', key:'odd'},{label:'19-36', key:'high'}
        ];
        leftOptions.forEach(opt=>{
          const btn = document.createElement('div'); btn.className='left-btn'; btn.textContent=opt.label;
          if(opt.style) btn.style.background=opt.style;
          btn.onclick = ()=> placeBet(opt.key, btn);
          leftBets.appendChild(btn);
        });

        // Number grid
        const numGrid = document.createElement('div'); numGrid.className='number-grid';
        for(let row=0; row<12; row++){
          for(let col=0; col<3; col++){
            const n = row*3 + col +1;
            const cell = document.createElement('div');
            cell.className = `number-cell ${REDS.has(n)?'red':'black'}`;
            cell.textContent = n;
            cell.style.position='relative';
            cell.onclick = (e)=>{ e.stopPropagation(); placeBet(`straight_${n}`, cell); };

            // vertical split (bottom edge)
            if(row<11){
              const splitV = document.createElement('div'); splitV.className='split-v';
              splitV.style.bottom='-4px'; splitV.style.height='8px'; splitV.style.left='0'; splitV.style.width='100%';
              splitV.onclick = (e)=>{ e.stopPropagation(); placeBet(`split_v_${n}_${n+3}`, splitV); };
              cell.appendChild(splitV);
            }
            // horizontal split (right edge)
            if(col<2){
              const splitH = document.createElement('div'); splitH.className='split-h';
              splitH.style.right='-4px'; splitH.style.width='8px'; splitH.style.height='100%'; splitH.style.top='0';
              splitH.onclick = (e)=>{ e.stopPropagation(); placeBet(`split_h_${n}_${n+1}`, splitH); };
              cell.appendChild(splitH);
            }
            // corner spot (bottom-right)
            if(row<11 && col<2){
              const corner = document.createElement('div'); corner.className='corner-spot';
              corner.style.bottom='-6px'; corner.style.right='-6px';
              corner.onclick = (e)=>{ e.stopPropagation(); placeBet(`corner_${n}_${n+1}_${n+3}_${n+4}`, corner); };
              cell.appendChild(corner);
            }
            numGrid.appendChild(cell);
          }
        }

        // Right bets (street & sixline)
        const rightBets = document.createElement('div'); rightBets.className='right-bets';
        for(let row=0; row<12; row++){
          const start = row*3+1;
          const streetBtn = document.createElement('div'); streetBtn.className='right-btn'; streetBtn.textContent=`${start}-${start+2}`;
          streetBtn.onclick = ()=> placeBet(`street_${start}`, streetBtn);
          rightBets.appendChild(streetBtn);
          // sixline between rows
          if(row<11){
            const sixBtn = document.createElement('div'); sixBtn.style.height='16px'; sixBtn.style.background='rgba(255,215,0,0.15)'; sixBtn.style.cursor='pointer';
            sixBtn.style.display='flex'; sixBtn.style.alignItems='center'; sixBtn.style.justifyContent='center';
            sixBtn.textContent = '⚊';
            sixBtn.onclick = ()=> placeBet(`sixline_${start}_${start+3}`, sixBtn);
            rightBets.appendChild(sixBtn);
          }
        }

        mainGrid.appendChild(leftBets);
        mainGrid.appendChild(numGrid);
        mainGrid.appendChild(rightBets);
        grid.appendChild(mainGrid);

        // Column bets
        const colRow = document.createElement('div'); colRow.className='column-row';
        for(let c=1; c<=3; c++){
          const colBtn = document.createElement('div'); colBtn.className='col-btn'; colBtn.textContent=`COL ${c}`;
          colBtn.onclick = ()=> placeBet(`col${c}`, colBtn);
          colRow.appendChild(colBtn);
        }
        grid.appendChild(colRow);
      }

      // ═══════════════ RACETRACK ═══════════════
      function buildRacetrack(){
        const container = document.getElementById('racetrackContainer');
        container.innerHTML = '';
        const w = container.clientWidth, h = 70;
        const cx = w/2, cy = h/2, rx = w/2-20, ry = 28;
        WHEEL_ORDER.forEach((num, idx)=>{
          const angle = (idx / WHEEL_ORDER.length) * Math.PI * 2 - Math.PI/2;
          const x = cx + rx * Math.cos(angle);
          const y = cy + ry * Math.sin(angle);
          const btn = document.createElement('div');
          btn.className = 'racetrack-number';
          btn.style.left = x+'px'; btn.style.top = y+'px';
          btn.textContent = num;
          btn.onclick = ()=> placeNeighborBet(num);
          container.appendChild(btn);
        });
      }

      // ═══════════════ BETTING LOGIC ═══════════════
      function placeBet(key, element){
        if(spinning) return;
        initAudio();
        if(balance < chipValue) { showToast('เงินไม่พอ'); return; }
        bets[key] = (bets[key]||0) + chipValue;
        betHistory.push({key, amount:chipValue});
        renderBets();
        playSound('chip');
        updateUI();
      }

      function placeNeighborBet(num){
        if(spinning) return;
        const idx = NUMBER_POS[num];
        const neighbors = [];
        for(let i=-2; i<=2; i++){
          let ni = (idx + i + WHEEL_ORDER.length) % WHEEL_ORDER.length;
          neighbors.push(WHEEL_ORDER[ni]);
        }
        const cost = neighbors.length * chipValue;
        if(balance < cost){ showToast('เงินไม่พอสำหรับเพื่อนบ้าน'); return; }
        neighbors.forEach(n=>{
          const key = `straight_${n}`;
          bets[key] = (bets[key]||0) + chipValue;
          betHistory.push({key, amount:chipValue});
        });
        renderBets();
        playSound('chip');
        updateUI();
      }

      function placeSpecial(type){
        if(spinning) return;
        initAudio();
        const betsToPlace = [];
        if(type==='voisins'){
          betsToPlace.push({key:'split_4_7', amount:chipValue}, {key:'split_12_15', amount:chipValue}, {key:'split_18_21', amount:chipValue},
            {key:'split_19_22', amount:chipValue}, {key:'split_32_35', amount:chipValue}, {key:'corner_25_26_28_29', amount:chipValue},
            {key:'street_0', amount:chipValue}); // 0/2/3 street
        } else if(type==='tiers'){
          const splits = [[5,8],[10,11],[13,16],[23,24],[27,30],[33,36]];
          splits.forEach(([a,b])=> betsToPlace.push({key:`split_${Math.min(a,b)}_${Math.max(a,b)}`, amount:chipValue}));
        } else if(type==='orphelins'){
          betsToPlace.push({key:'split_6_9', amount:chipValue}, {key:'split_14_17', amount:chipValue}, {key:'split_17_20', amount:chipValue},
            {key:'split_31_34', amount:chipValue}, {key:'straight_1', amount:chipValue});
        } else if(type==='zero'){
          betsToPlace.push({key:'split_0_3', amount:chipValue}, {key:'split_12_15', amount:chipValue}, {key:'split_32_35', amount:chipValue},
            {key:'straight_26', amount:chipValue});
        }
        const totalCost = betsToPlace.reduce((s,b)=>s+b.amount,0);
        if(balance < totalCost){ showToast('เงินไม่พอ'); return; }
        betsToPlace.forEach(b=>{
          bets[b.key] = (bets[b.key]||0) + b.amount;
          betHistory.push({key:b.key, amount:b.amount});
        });
        renderBets();
        playSound('chip');
        updateUI();
      }

      function undoBet(){
        if(!betHistory.length || spinning) return;
        const last = betHistory.pop();
        bets[last.key] -= last.amount;
        if(bets[last.key] <= 0) delete bets[last.key];
        renderBets();
        updateUI();
      }

      function clearBets(){ bets = {}; betHistory = []; renderBets(); updateUI(); }

      function renderBets(){
        document.querySelectorAll('.bet-badge').forEach(b=>b.remove());
        for(let [key, amt] of Object.entries(bets)){
          if(amt<=0) continue;
          let el = document.querySelector(`[data-betkey="${key}"]`);
          if(!el) {
            // find by key pattern
            if(key.startsWith('straight_')){
              const num = key.split('_')[1];
              el = document.querySelector(`.number-cell`) && [...document.querySelectorAll('.number-cell')].find(c=>c.textContent==num);
              if(num==='0') el = document.querySelector('.zero-cell');
            } else if(key.startsWith('split_v_')){
              const [_,a,b] = key.split('_');
              el = document.querySelector(`.split-v`) && [...document.querySelectorAll('.split-v')].find(s=> s.parentElement && s.parentElement.textContent==a);
            } else if(key.startsWith('split_h_')){
              // find horizontal split between a and a+1
            } else if(key.startsWith('corner_')){
              // find corner near numbers
            }
            // simplified: we'll just mark on clicked element if we store reference. But to simplify, we'll add data-betkey to cells.
            // We'll rebuild table with data attributes.
          }
        }
        // Rebuild table with data attributes:
        rebuildTableWithData();
      }

      function rebuildTableWithData(){
        // Re-render the table HTML with data-betkey attributes for easier badge placement.
        // We'll rebuild table from scratch and attach badges.
        buildTable(); // re-create fresh
        // re-attach bets badges
        for(let [key, amt] of Object.entries(bets)){
          if(amt<=0) continue;
          const el = findBetElement(key);
          if(el){
            const badge = document.createElement('div'); badge.className='bet-badge';
            badge.textContent = amt>=1000 ? (amt/1000).toFixed(amt%1000?1:0)+'k' : amt;
            el.style.position = 'relative';
            el.appendChild(badge);
          }
        }
      }

      function findBetElement(key){
        if(key.startsWith('straight_')){
          const n = key.split('_')[1];
          if(n==='0') return document.querySelector('.zero-cell');
          const cells = [...document.querySelectorAll('.number-cell')];
          return cells.find(c=>c.textContent == n);
        } else if(key.startsWith('split_v_')){
          const [_,a,b] = key.split('_');
          const cells = [...document.querySelectorAll('.number-cell')];
          const cellA = cells.find(c=>c.textContent == a);
          return cellA ? cellA.querySelector('.split-v') : null;
        } else if(key.startsWith('split_h_')){
          const [_,a,b] = key.split('_');
          const cells = [...document.querySelectorAll('.number-cell')];
          const cellA = cells.find(c=>c.textContent == a);
          return cellA ? cellA.querySelector('.split-h') : null;
        } else if(key.startsWith('corner_')){
          const parts = key.split('_'); const a = parts[1];
          const cells = [...document.querySelectorAll('.number-cell')];
          const cellA = cells.find(c=>c.textContent == a);
          return cellA ? cellA.querySelector('.corner-spot') : null;
        } else if(key.startsWith('street_')){
          const start = parseInt(key.split('_')[1]);
          const rightBtns = [...document.querySelectorAll('.right-btn')];
          return rightBtns.find(b=>b.textContent.startsWith(start));
        } else if(key.startsWith('sixline_')){
          const [_,s1,s2] = key.split('_');
          const sixBtns = [...document.querySelectorAll('.right-bets > div')].filter(d=>d.textContent==='⚊');
          // find proper index
          const startNum = parseInt(s1);
          const rowIndex = Math.floor((startNum-1)/3);
          return sixBtns[rowIndex] || null;
        } else if(key==='low'||key==='even'||key==='red'||key==='black'||key==='odd'||key==='high'){
          const leftBtns = [...document.querySelectorAll('.left-btn')];
          const labels = {'low':'1-18','even':'EVEN','red':'♦','black':'◇','odd':'ODD','high':'19-36'};
          return leftBtns.find(b=>b.textContent===labels[key]);
        } else if(key.startsWith('col')){
          const colNum = key.replace('col','');
          const colBtns = [...document.querySelectorAll('.col-btn')];
          return colBtns[parseInt(colNum)-1];
        }
        return null;
      }

      // ═══════════════ WHEEL DRAWING ═══════════════
      function drawWheel(angle){
        ctx.clearRect(0,0,W,H);
        const total = WHEEL_ORDER.length;
        const arc = Math.PI*2/total;
        for(let i=0;i<total;i++){
          const a = i*arc + angle - Math.PI/2;
          const n = WHEEL_ORDER[i];
          ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,a,a+arc); ctx.closePath();
          ctx.fillStyle = n===0?'#0b5825': REDS.has(n)?'#b01c1c':'#1a1a1a';
          ctx.fill();
          ctx.strokeStyle='rgba(212,168,67,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
          const textAngle = a+arc/2;
          const tx = CX + (R-20)*Math.cos(textAngle), ty = CY + (R-20)*Math.sin(textAngle);
          ctx.save(); ctx.translate(tx,ty); ctx.rotate(textAngle+Math.PI/2);
          ctx.fillStyle='#fff'; ctx.font='bold 8px Cinzel'; ctx.textAlign='center'; ctx.fillText(n,0,0); ctx.restore();
        }
        // center
        ctx.beginPath(); ctx.arc(CX,CY,38,0,Math.PI*2);
        const grad = ctx.createRadialGradient(CX,CY,0,CX,CY,38);
        grad.addColorStop(0,'#444'); grad.addColorStop(1,'#111');
        ctx.fillStyle=grad; ctx.fill();
        ctx.strokeStyle='rgba(212,168,67,0.6)'; ctx.lineWidth=2; ctx.stroke();

        // ball
        if(ballVisible){
          const bx = CX + (R-26)*Math.cos(ballAngle), by = CY + (R-26)*Math.sin(ballAngle);
          ctx.beginPath(); ctx.arc(bx,by,6,0,2*Math.PI);
          ctx.fillStyle='#fff'; ctx.fill();
          ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
        }
      }

      // ═══════════════ SPIN ═══════════════
      function startSpin(){
        if(spinning) return;
        const total = Object.values(bets).reduce((a,b)=>a+b,0);
        if(total===0){ showToast('กรุณาวางเดิมพัน'); return; }
        if(total>balance){ showToast('เงินไม่พอ'); return; }
        initAudio();
        spinning = true;
        balance -= total;
        saveState();
        updateUI();

        const winNumber = WHEEL_ORDER[Math.floor(Math.random()*WHEEL_ORDER.length)];
        const winIdx = NUMBER_POS[winNumber];
        const segmentAngle = (Math.PI*2)/WHEEL_ORDER.length;
        const targetWheelAngle = - (winIdx * segmentAngle) ; // align win number under pointer (top)
        const startWheel = wheelAngle;
        const totalWheelSpin = targetWheelAngle + Math.PI*8 + (Math.random()*Math.PI*2); // multiple rotations

        // Ball animation
        ballVisible = true;
        ballAngle = Math.random()*Math.PI*2;
        const startBall = ballAngle;
        const targetBallAngle = -Math.PI/2; // ball lands at top (pointer)
        const totalBallSpin = targetBallAngle + Math.PI*10 + (Math.random()*Math.PI*2);

        let startTime = null;
        const duration = 5000; // ms
        playSound('spin');

        function animate(ts){
          if(!startTime) startTime = ts;
          const elapsed = ts - startTime;
          const progress = Math.min(elapsed/duration, 1);
          const ease = t => t<0.5 ? 4*t*t*t : (t-1)*(2*t-2)*(2*t-2)+1;
          const ep = ease(progress);
          wheelAngle = startWheel + totalWheelSpin * ep;
          ballAngle = startBall + totalBallSpin * ep;
          drawWheel(wheelAngle);
          if(progress<1){
            animationId = requestAnimationFrame(animate);
          } else {
            wheelAngle = targetWheelAngle;
            ballVisible = false;
            drawWheel(wheelAngle);
            spinning = false;
            animationId = null;
            resolveResult(winNumber, total);
          }
        }
        animationId = requestAnimationFrame(animate);
      }

      function resolveResult(num, totalBet){
        lastResults.unshift(num); if(lastResults.length>20) lastResults.pop();
        updateHistoryStrip();
        const col = colorOf(num);
        lastNumberDiv.textContent = num; lastNumberDiv.style.background = numStyle(num);

        // calculate win
        const payouts = getPayouts(num);
        let winAmount = 0;
        for(let [key,amt] of Object.entries(bets)){
          if(payouts[key]) winAmount += amt * (payouts[key] + 1);
        }
        balance += winAmount;
        saveState();

        // modal
        modalNumber.textContent = num;
        modalNumber.style.color = col==='r'?'#f55':col==='b'?'#ddd':'#5f5';
        modalSub.textContent = col==='r'?'RED':col==='b'?'BLACK':'GREEN';
        if(winAmount>0){
          modalVerdict.innerHTML = '🎉 WIN!'; modalVerdict.style.color='#4f4';
          modalAmount.textContent = `รับ ${formatMoney(winAmount)} (กำไร +${formatMoney(winAmount-totalBet)})`;
          playSound('win');
          spawnConfetti();
        } else {
          modalVerdict.innerHTML = '💸 LOSE'; modalVerdict.style.color='#f55';
          modalAmount.textContent = `เสีย ${formatMoney(totalBet)}`;
          playSound('lose');
        }
        resultModal.classList.add('on');
        bets = {}; betHistory = [];
        rebuildTableWithData();
        updateUI();
      }

      function getPayouts(n){
        const p = {};
        p[`straight_${n}`] = 35;
        if(REDS.has(n)) p['red']=1;
        if(!REDS.has(n) && n!==0) p['black']=1;
        if(n>0 && n%2===0) p['even']=1;
        if(n>0 && n%2!==0) p['odd']=1;
        if(n>=1 && n<=18) p['low']=1;
        if(n>=19 && n<=36) p['high']=1;
        if(n>=1 && n<=12) p['dozen1']=2;
        if(n>=13 && n<=24) p['dozen2']=2;
        if(n>=25 && n<=36) p['dozen3']=2;
        [1,2,3].forEach(c=>{ if([COL1,COL2,COL3][c-1].has(n)) p[`col${c}`]=2; });
        // splits, streets etc.
        for(let [key,amt] of Object.entries(bets)){
          if(key.startsWith('split_v_')||key.startsWith('split_h_')){
            const nums = key.split('_').slice(1).map(Number);
            if(nums.includes(n)) p[key]=17;
          } else if(key.startsWith('corner_')){
            const nums = key.split('_').slice(1).map(Number);
            if(nums.includes(n)) p[key]=8;
          } else if(key.startsWith('street_')){
            const start = parseInt(key.split('_')[1]);
            if(n>=start && n<=start+2) p[key]=11;
          } else if(key.startsWith('sixline_')){
            const [_,s1,s2] = key.split('_').map(Number);
            if((n>=s1&&n<=s1+5) || (n>=s2&&n<=s2+5)) p[key]=5;
          }
        }
        return p;
      }

      function closeModal(){ resultModal.classList.remove('on'); if(balance<10){ balance=1000; saveState(); showToast('เติมเงินอัตโนมัติ 1,000'); updateUI(); } }

      function updateHistoryStrip(){
        historyStrip.innerHTML = '<span style="color:#666;font-size:10px;">ผลล่าสุด:</span>';
        lastResults.forEach(n=>{
          const d = document.createElement('div'); d.className=`history-num ${colorOf(n)}`; d.textContent=n;
          historyStrip.appendChild(d);
        });
      }

      function spawnConfetti(){
        for(let i=0;i<50;i++){
          const el = document.createElement('div'); el.className='confetti';
          el.style.left=Math.random()*100+'vw'; el.style.background=['#d4a843','#f0c96a','#4f4','#f55'][Math.floor(Math.random()*4)];
          el.style.animationDuration=(1.5+Math.random()*2)+'s'; el.style.width=el.style.height=(5+Math.random()*8)+'px';
          document.body.appendChild(el); setTimeout(()=>el.remove(),3000);
        }
      }

      function editName(){
        const newName = prompt('ตั้งชื่อผู้เล่น:', playerName);
        if(newName!==null){
          playerName = newName.trim().substring(0,15);
          localStorage.setItem('royalRouletteName', playerName);
          nameDisplay.textContent = playerName ? `👤 ${playerName}` : '👤 ตั้งชื่อ';
        }
      }

      // initial render
      buildTable();
      buildRacetrack();
      updateUI();
      drawWheel(0);
      window.addEventListener('resize', ()=>{ buildRacetrack(); });
      // set default chip active
      document.querySelector('.chip[data-value="10"]').classList.add('active');
    })();
  </script>
